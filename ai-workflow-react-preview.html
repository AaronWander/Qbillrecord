      function AgentCard({ agent, active, onClick }) {

              position: "absolute",

          H = 560;

          pos[a.id] = { x: (a.x / 100) * W, y: (a.y / 100) * H };

          { from: "claude", to: "manus" },
          { from: "claude", to: "gemini" },
          { from: "claude", to: "grok" },

          { from: "openclaw", to: "manus" },

          { from: "gemini", to: "claude", offset: 33 },

 radial-gradient(ellipse at 50% 0%, #1a1200 0%, transparent 60%),

              padding: "0 0 60px",

            >
              {[
                { label: "TELEGRAM", sub: "20 Commands", icon: " ", color: "#29B6F6" },

                  overflow: "hidden",

              >

                  style={{
                    position: "absolute",
                    bottom: 0,
                    left: "10%",
                    right: "10%",
                    height: 130,
                    background:
                      "radial-gradient(ellipse at center bottom, #FF704320 0%, transparent 70%)",
                    pointerEvents: "none",
                  }}
                />
                {/* Layer labels */}
                <div
                  style={{
                    position: "absolute",
                    left: 14,
                    top: 0,
                    bottom: 0,
                    display: "flex",
                    flexDirection: "column",
                    justifyContent: "space-around",
                    pointerEvents: "none",

                    const f = pos[c.from],

                    const color = isOC

                    return (
                      <line
                        key={i}
                        x1={f.x}
                        y1={f.y}
                        x2={t.x}
                        y2={t.y}

                        strokeWidth={isOC ? 1 : 1.5}

                    const f = pos[c.from],
                      t = pos[c.to];
                    if (!f || !t) return null;
                    const prog = ((tick + c.offset) % 100) / 100;
                    const cx = f.x + (t.x - f.x) * prog;
                    const cy = f.y + (t.y - f.y) * prog;
                    const color =
                      c.from === "openclaw"
                        ? "#FF7043"
                        : agents.find((a) => a.id === c.from)?.color;
                    return (
                      <circle
                        key={i}
                        cx={cx}
                        cy={cy}
                        r={3.5}
                        fill={color}
                        style={{ filter: `drop-shadow(0 0 5px ${color})` }}

                    );

                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>

              <div style={{ marginTop: 20 }}>

                    color: "#D4AF3766",

                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>

                      <div>
                        <div style={{ fontWeight: 700, fontSize: 10, color: rv.color }}>
                          {rv.label}
                        </div>
                        <div style={{ fontSize: 7, color: "#666", marginTop: 2 }}>
                          {rv.detail}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              {/* KPI Bar */}
              <div
                style={{
                  marginTop: 18,
                  background: "linear-gradient(135deg, #1a1000, #0d1a00)",
                  border: "1.5px solid #D4AF3733",
                  borderRadius: 14,
                  padding: "14px 18px",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  flexWrap: "wrap",
                  gap: 10,
                }}
              >
                {[
                  { label: "DAILY TARGET", value: "$11,295", unit: "/ day", color: "#D4AF37" },
                  { label: "AI STACK COST", value: "~$89–$119", unit: "/ mo", color: "#69F0AE" },
                  { label: "BDT VALUATION", value: "$8.0B", unit: "FMV", color: "#4FC3F7" },
                  { label: "OPENCLAW", value: "FREE", unit: "open-source", color: "#FF7043" },
                ].map((k, i) => (
                  <div key={i}>
                    <div
                      style={{
                        fontFamily: "monospace",
                        fontSize: 8,
                        color: k.color,
                        letterSpacing: 2,
                        marginBottom: 2,
                      }}
                    >
                      {k.label}
                    </div>
                    <div style={{ fontWeight: 900, fontSize: 20, color: "#fff" }}>
                      {k.value}{" "}
                      <span style={{ fontSize: 10, color: k.color + "99" }}>{k.unit}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<AIWorkflow />);
    </script>
  </body>
</html>
